<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>JYF</title><style>html,
      body {
        width: 100%;
        height: 100%;
        font-size: 16px;
      }
      html {
        box-sizing: border-box;
      }
      *,
      *:before,
      *:after {
        box-sizing: inherit;
      }
      body {
        display: flex;
        position: fixed;
        margin: 0;
        padding: 0;
        border: 0;
        outline: 0;
        background: 0 0;
        overflow: hidden;
        user-select: none;
        overscroll-behavior-x: none;
      }
      #loading {
        position: absolute;
        z-index: 100000;
        width: 100vw;
        height: 100vh;
        background-color: black;
      }
      #loading .loader {
        border: 16px solid #ffffff;
        border-radius: 50%;
        border-top: 16px solid #000000;
        width: 120px;
        height: 120px;
        animation: spin 2s linear infinite;
        position: absolute;
        top: calc(50% - 60px);
        left: calc(50% - 60px);
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }</style></head><body><div id="loading"><div class="loader"></div></div><div id="actionDialog"></div><script src="https://cdn.jsdelivr.net/gh/zhouxiaobo1990/jyf_scripts_jsdelivr@0.5.4/scripts/33898841f4b545b6b055.bundle.js"></script><script src="https://cdn.jsdelivr.net/gh/zhouxiaobo1990/jyf_scripts_jsdelivr@0.5.4/scripts/23254761a7780a213248.bundle.js"></script><script src="https://cdn.jsdelivr.net/gh/zhouxiaobo1990/jyf_scripts_jsdelivr@0.5.4/scripts/1598eada73fa76c3f490.bundle.js"></script><script src="https://cdn.jsdelivr.net/gh/zhouxiaobo1990/jyf_scripts_jsdelivr@0.5.4/scripts/6c18926ad02212a2e4b5.bundle.js"></script></body></html>
