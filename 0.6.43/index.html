<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="renderer" content="webkit"><title>JYF</title><style>html,
      body {
        width: 100%;
        height: 100%;
        font-size: 16px;
      }
      html {
        box-sizing: border-box;
      }
      *,
      *:before,
      *:after {
        box-sizing: inherit;
      }
      body {
        display: flex;
        position: fixed;
        margin: 0;
        padding: 0;
        border: 0;
        outline: 0;
        background: 0 0;
        overflow: hidden;
        user-select: none;
        overscroll-behavior-x: none;
      }
      #loading {
        position: absolute;
        z-index: 100000;
        width: 100vw;
        height: 100vh;
        background-color: black;
      }
      #loading .loader {
        border: 16px solid #ffffff;
        border-radius: 50%;
        border-top: 16px solid #000000;
        width: 120px;
        height: 120px;
        animation: spin 2s linear infinite;
        position: absolute;
        top: calc(50% - 60px);
        left: calc(50% - 60px);
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
