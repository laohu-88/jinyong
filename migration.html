<!doctype html><html><head><meta charset="utf-8"><title>存档迁移</title><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body>
<div>在浏览器之间迁移存档时，推荐使用游戏内的上传/下载存档功能。如果旧浏览器不支持下载存档，可用该工具。</div>
<div>1. 在旧浏览器里打开该页面，点击“下载”按钮，会把存档生成在文本区域。</div>
<div>2. 在新浏览器里打开该页面，把旧浏览器的存档复制到文本区域，再点击“上传按钮”。</div>
<div>3. 在新浏览器里，进入游戏。</div>
<button type="button" id="download">下载</button>
<button type="button" id="upload">上传</button>
<br>
<textarea id="area" style="width: 100%; height: 400px;"></textarea>
<script>
document.getElementById("download").onclick = function() {
  document.getElementById("area").value = localStorage.getItem("jyf/0.6/save");
}
document.getElementById("upload").onclick = function() {
  localStorage.setItem("jyf/0.6/save", document.getElementById("area").value);
  alert("上传成功！");
}
</script>
</body>
</html>
